<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Olá Mundo - Gatinho</title>
  
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: linear-gradient(to bottom, #e0f7fa, #b2ebf2);
      min-height: 100vh;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #333;
    }

    h1 {
      font-size: 5rem;
      margin: 20px 0;
      color: #0277bd;
      text-shadow: 4px 4px 10px rgba(0, 0, 0, 0.15);
      animation: bounce 2s infinite;
    }

    .gatinho {
      max-width: 90%;
      margin: 20px 0;
      text-align: center;
    }

    img {
      max-width: 400px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
      transition: transform 0.3s ease;
    }

    img:hover {
      transform: scale(1.1);
    }

    p {
      font-size: 1.4rem;
      color: #555;
      margin-top: 15px;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-20px); }
    }

    @media (max-width: 600px) {
      h1 { font-size: 3.5rem; }
      img { max-width: 300px; }
    }
  </style>
</head>
<body>

  <h1>Olá Mundo!</h1>

  <div class="gatinho">
    <img src="https://media.gettyimages.com/id/1352324044/photo/portrait-cute-little-striped-scottish-fold-kitten-cat-at-home-kitty-looking-at-camera-on.jpg?s=1024x1024&w=gi&k=20&c=el0j3PGi9JyOsjJwUD_VVKMj98vfmcOs8is5sSx5un8=" 
         alt="Gatinho fofo olhando para a câmera">
    <p>Um gatinho pra alegrar seu dia 😺</p>
  </div>

</body>
</html>
