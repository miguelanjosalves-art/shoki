<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Olá, Mundo! - Snowy Undertale</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Olá, Mundo! 🌨️</h1>

    <audio id="bgMusic" autoplay loop muted>
        <source src="snowy.mp3" type="audio/mpeg">
        Seu navegador não suporta áudio.
    </audio>

    <script>
        const music = document.getElementById('bgMusic');

        // Garante que começa mudo e autoplay (quase sempre permitido)
        music.muted = true;
        music.volume = 0.4;

        // No primeiro clique/touch na página → tira o mute e toca com som
        document.body.addEventListener('click', function enableSound() {
            music.muted = false;
            music.play().catch(() => {});
            // Pode adicionar um texto sutil se quiser
            // document.body.insertAdjacentHTML('beforeend', '<small style="position:fixed;bottom:10px;left:10px;color:#00ffea;">Música ativada! ❄️</small>');
            document.body.removeEventListener('click', enableSound);
        }, { once: true });
    </script>
</body>
</html>
