<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Olá, Mundo!🌨️</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Faz o player do YouTube ficar invisível */
        #ytplayer {
            position: absolute;
            top: -9999px;
            left: -9999px;
            width: 1px;
            height: 1px;
        }

        /* Deixa o texto "Olá, Mundo!" parecer clicável */
        h1 {
            cursor: pointer;
            transition: all 0.3s ease;
        }
        h1:hover {
            transform: scale(1.08);
            text-shadow: 0 0 40px #00ffea, 0 0 80px #ff00aa;
        }
    </style>
</head>
<body>
    <h1 id="playTrigger">Olá, Mundo! 🌨️</h1>
<!-- Imagem que cai (escondida no início) -->
<img id="fallingNoelle" 
     src="https://media1.tenor.com/m/WzWaEoFs9SgAAAAd/sea-lion-sea.gif" 
     alt="Noelle caindo"
     style="position: fixed; left: 50%; transform: translateX(-50%); top: -200px; width: 180px; pointer-events: none; opacity: 0; image-rendering: pixelated;">

<!-- Áudio do som de queda/whoosh descendente (escondido) -->
<audio id="fallSound" preload="auto">
  <source src="https://assets.mixkit.co/sfx/preview/mixkit-cartoon-fast-whoosh-1489.mp3" type="audio/mpeg">
</audio>

<script>
  // Sequência: cima cima baixo baixo cima cima baixo baixo A
  const secretSequence = [
    'ArrowUp', 'ArrowUp', 
    'ArrowDown', 'ArrowDown', 
    'ArrowUp', 'ArrowUp', 
    'ArrowDown', 'ArrowDown', 
    'a'
  ];

  let currentIndex = 0;

  document.addEventListener('keydown', (e) => {
    if (e.repeat) return;

    const pressedKey = e.key;

    if (pressedKey === secretSequence[currentIndex] || 
        pressedKey.toLowerCase() === secretSequence[currentIndex]) {
      
      currentIndex++;

      if (currentIndex === secretSequence.length) {
        const img = document.getElementById('fallingNoelle');
        const sound = document.getElementById('fallSound');

        // Reseta e mostra a imagem no topo
        img.style.top = '-200px';
        img.style.opacity = '1';
        img.style.transition = 'none';
        void img.offsetWidth; // força reset da animação

        // Toca o som imediatamente (whoosh descendente)
        sound.currentTime = 0; // reseta para início
        sound.play().catch(err => console.log("Erro no play:", err)); // autoplay pode precisar de interação prévia

        // Anima descendo lentamente (8 segundos)
        img.style.transition = 'top 8s linear';
        img.style.top = '100vh';

        // Para o som e esconde tudo depois de ~8s
        setTimeout(() => {
          sound.pause();
          sound.currentTime = 0;
          img.style.opacity = '0';
          currentIndex = 0; // permite repetir a sequência
        }, 8500);

        // Fundo opcional para efeito
        document.body.style.background = 'linear-gradient(to bottom, #0a0015, #1a0033)';
      }
    } else {
      currentIndex = 0; // reseta se errar
    }
  });
</script>
    <!-- Filhote brincando com bolinha -->
 <a href="https://deltarune.wiki/" target="_blank">
  <img src="https://media1.tenor.com/m/pha-P64dDmIAAAAC/noelle-holiday.gif"
       alt="Clique na Noelle para ir à Wiki de Deltarune" 
       style="max-width: 350px; border-radius: 15px; box-shadow: 0 8px 20px rgba(255,105,180,0.5);">
</a>
    
    <!-- Player do YouTube escondido - Snowy (Undertale) -->
    <iframe 
        id="ytplayer" 
        src="https://www.youtube.com/embed/QZ1Jp-Wg7b0?autoplay=1&mute=1&loop=1&playlist=QZ1Jp-Wg7b0&rel=0&modestbranding=1&controls=0&showinfo=0&iv_load_policy=3" 
        frameborder="0" 
        allow="autoplay; encrypted-media" 
        allowfullscreen>
    </iframe>

    <script>
        // Pega os elementos
        const trigger = document.getElementById('playTrigger');
        const player = document.getElementById('ytplayer');

        // Quando clicar no "Olá, Mundo!"
        trigger.addEventListener('click', function() {
            // Remove o mute (ativa o som)
            let newSrc = player.src.replace('&mute=1', '');
            player.src = newSrc;

            // Mostra uma mensagem bonitinha (opcional)
            const feedback = document.createElement('div');
            feedback.textContent = '❄️ Snowy começou a tocar!';
            feedback.style.position = 'fixed';
            feedback.style.bottom = '30px';
            feedback.style.left = '50%';
            feedback.style.transform = 'translateX(-50%)';
            feedback.style.background = 'rgba(0, 255, 234, 0.2)';
            feedback.style.color = '#00ffea';
            feedback.style.padding = '15px 30px';
            feedback.style.borderRadius = '15px';
            feedback.style.fontFamily = "'Courier New', monospace";
            feedback.style.fontSize = '1.3rem';
            feedback.style.backdropFilter = 'blur(5px)';
            feedback.style.zIndex = '100';
            document.body.appendChild(feedback);

            // Some a mensagem depois de 4 segundos
            setTimeout(() => feedback.remove(), 4000);
        });
    </script>
</body>
