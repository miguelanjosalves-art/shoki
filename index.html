<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>DELTARUNE CLICKER - ENTER TO START</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
  
  <style>
    body {
      margin: 0; height: 100vh;
      background: linear-gradient(to bottom, #0f0829 0%, #1a0e3d 40%, #2a1352 100%);
      color: #e0c8ff; font-family: 'VT323', monospace; font-size: 2.4rem;
      overflow: hidden; image-rendering: pixelated;
      display: flex; align-items: center; justify-content: center;
      user-select: none; touch-action: manipulation;
    }

    .screen {
      display: none; width: 100%; height: 100%;
      align-items: center; justify-content: center;
      flex-direction: column; position: absolute;
    }
    .screen.active { display: flex; }

    .scene { display: flex; align-items: center; justify-content: center; width: 100%; max-width: 1400px; gap: 60px; }
    .character { width: 160px; height: auto; filter: drop-shadow(0 0 15px rgba(255, 110, 240, 0.7)); animation: floatChar 6s ease-in-out infinite; }
    .right-char { transform: scaleX(-1); }
    
    h1 {
      font-family: 'Press Start 2P', cursive; font-size: 3rem; color: #fff8e8;
      text-shadow: 0 0 12px #ff6ef0, 8px 8px 0 #000;
      margin: 0 0 20px 0; animation: glitch 5s infinite; text-align: center;
    }

    .heart { font-size: 60px; margin: 10px auto; animation: float 5s ease-in-out infinite; color: #ff2d55; }

    .ralsei-container { position: relative; display: inline-block; }

    .ralsei-btn {
      width: 220px; height: auto; display: block;
      transition: transform 0.05s;
      filter: drop-shadow(0 0 15px rgba(0, 255, 0, 0.4));
      cursor: pointer;
    }
    .ralsei-btn:active { transform: scale(0.9) !important; }

    /* Estilo para a imagem minúscula do Spamton */
    #mini-spamton {
      position: absolute; width: 50px; height: auto;
      right: -60px; top: 50%; transform: translateY(-50%);
      display: none; animation: float 2s ease-in-out infinite;
      filter: drop-shadow(0 0 5px yellow);
    }
    
    #kromer-display {
      font-family: 'Press Start 2P', cursive; font-size: 3rem;
      color: #ffff00; text-shadow: 4px 4px 0 #000; margin-bottom: 10px;
    }

    .timer-display { font-size: 1.5rem; color: #fff; margin-bottom: 20px; }

    #upgrade-container { margin-top: 10px; display: none; min-height: 80px; }
    
    .btn-upgrade {
      background: #000; color: #00ff00; border: 4px solid #fff;
      padding: 15px 30px; font-family: 'Press Start 2P', cursive;
      font-size: 1.1rem; cursor: pointer; box-shadow: 5px 5px 0 #00ff00;
    }

    .menu-buttons { position: absolute; bottom: 20px; display: flex; gap: 20px; }
    .btn-ui {
      background: #000; color: #fff; border: 3px solid #fff;
      padding: 10px 20px; font-family: 'Press Start 2P', cursive; font-size: 0.8rem; cursor: pointer;
    }

    #ranking-modal {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.9); z-index: 100; align-items: center; justify-content: center; flex-direction: column;
    }

    @keyframes glitch { 0%, 100% { transform: translate(0); } 2%, 4% { transform: translate(-3px, 3px); } }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
    @keyframes floatChar { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
  </style>
</head>
<body>

  <div id="yt-player" style="position: absolute; top: -1000px;"></div>

  <div id="intro-screen" class="screen active">
    <div class="scene">
      <img src="https://media.tenor.com/osrwVQsq5NUAAAAi/kris-deltarune.gif" class="character">
      <div style="text-align:center">
        <h1>DELTARUNE CLICKER</h1>
        <div class="heart">♥</div>
        <div id="start-msg" style="font-size: 1.5rem; color: #b19cd9; animation: float 2s infinite;">Pressione [ENTER] para Iniciar</div>
        <div style="font-size: 0.8rem; color: #666; margin-top: 10px;">(Clique na tela uma vez antes para ativar o som)</div>
      </div>
      <img src="https://media.tenor.com/8qguU3aky9IAAAAj/susie-deltarune.gif" class="character right-char">
    </div>
  </div>

  <div id="game-screen" class="screen">
    <div id="kromer-display">$ <span id="count">0</span></div>
    <div class="timer-display">TEMPO: <span id="timer">00:00</span></div>
    
    <div class="ralsei-container">
        <img src="https://media.tenor.com/uQaQC--pzp8AAAAi/ralsei-spin.gif" id="ralsei-img" class="ralsei-btn" onclick="addKromer()">
        <img src="https://media.tenor.com/69pA_Y6S69UAAAAi/spamton-g-spamton-spamton.gif" id="mini-spamton">
    </div>
         
    <div id="upgrade-container">
        <button id="upgrade-btn" class="btn-upgrade" onclick="buyUpgrade()"></button>
    </div>

    <div class="subtitle" id="game-sub" style="margin-top: 20px; font-size: 1.5rem;">USE O MOUSE PARA CLICAR!</div>

    <div class="menu-buttons">
      <button class="btn-ui" onclick="saveGame()">SALVAR</button>
      <button class="btn-ui" onclick="toggleRanking()">RANKING</button>
      <button class="btn-ui" onclick="resetGame()" style="color: red; border-color: red;">RESET</button>
    </div>
  </div>

  <div id="ranking-modal">
    <h2 style="font-family:'Press Start 2P'; color: yellow;">[[ RECORDES LOCAIS ]]</h2>
    <div id="ranking-list" style="margin: 20px 0;"></div>
    <button class="btn-ui" onclick="toggleRanking()">FECHAR</button>
  </div>

  <script src="https://www.youtube.com/iframe_api"></script>
  <script>
    let kromer = 0;
    let clickValue = 1;
    let autoValue = 0;
    let gameStarted = false;
    let secondsPlayed = 0;
    let timerInterval;
    let hasMiniSpamton = false;
    const musicId = "In3y0C7mQvA"; // Música Inicial
    const bossMusicId = "v_Uv6G-mC4I"; // Música do Boss Final

    const clickSound = new Audio('https://www.soundjay.com/buttons/sounds/button-37.mp3');
    const upgradeSound = new Audio('https://www.soundjay.com/buttons/sounds/button-09.mp3');

    window.onload = () => { loadGame(); };

    function formatTime(s) {
        const mins = Math.floor(s / 60);
        const secs = s % 60;
        return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
    }

    function updateDisplay() {
      document.getElementById('count').innerText = Math.floor(kromer);
      document.getElementById('timer').innerText = formatTime(secondsPlayed);
      checkUpgrades();
    }

    function addKromer() {
      if(!gameStarted) return;
      kromer += clickValue;
      updateDisplay();
      clickSound.currentTime = 0;
      clickSound.play();
      const ralsei = document.getElementById('ralsei-img');
      ralsei.style.transform = "scale(1.1)";
      setTimeout(() => { ralsei.style.transform = "scale(1)"; }, 50);
    }

    function checkUpgrades() {
      const container = document.getElementById('upgrade-container');
      const btn = document.getElementById('upgrade-btn');
      
      if (clickValue === 1 && kromer >= 50) {
          container.style.display = 'block';
          btn.innerHTML = "[[UPGRADE]] - 50 <br> (+2 P/ CLIQUE)";
      } 
      else if (clickValue === 2 && kromer >= 200) {
          container.style.display = 'block';
          btn.innerHTML = "[[SUPREMO]] - 200 <br> (GIRAR!)";
      }
      else if (clickValue === 3 && kromer >= 500) {
          container.style.display = 'block';
          btn.innerHTML = "[[NEO]] - 500 <br> (+5 P/ CLIQUE)";
      } 
      else if (clickValue === 8 && kromer >= 1700 && !document.body.style.filter.includes("280deg")) {
          container.style.display = 'block';
          btn.innerHTML = "[[ULTRA]] - 1700 <br> (8 PONTOS FIXOS)";
      }
      else if (clickValue === 8 && kromer >= 3000 && clickValue < 12) {
          container.style.display = 'block';
          btn.innerHTML = "[[HYPER-LINK]] - 3000 <br> (12 P/ CLIQUE)";
      }
      else if (clickValue === 12 && kromer >= 5500 && clickValue < 24) {
          container.style.display = 'block';
          btn.innerHTML = "[[BIGGER SHOT]] - 5500 <br> (24 P/ CLIQUE)";
      }
      else if (autoValue === 0 && kromer >= 6700) {
          container.style.display = 'block';
          btn.innerHTML = "[[GERADOR]] - 6700 <br> (+10 P/ SEGUNDO)";
      }
      // NOVO UPGRADE 10.000
      else if (!hasMiniSpamton && kromer >= 10000) {
          container.style.display = 'block';
          btn.innerHTML = "[[BIG SHOT]] - 10000 <br> (39 P/ CLIQUE + BOSS MUSIC)";
      }
      else { container.style.display = 'none'; }
    }

    function buyUpgrade() {
      const ralseiImg = document.getElementById('ralsei-img');
      const sub = document.getElementById('game-sub');

      if (clickValue === 1 && kromer >= 50) {
          upgradeSound.play(); kromer -= 50; clickValue = 2;
          sub.innerText = "BIG SHOT!";
      } 
      else if (clickValue === 2 && kromer >= 200) {
          upgradeSound.play(); kromer -= 200; clickValue = 3;
          ralseiImg.src = "https://media.tenor.com/pBhLGoicbhsAAAAi/ralsei-ralsei-spin.gif";
          sub.innerText = "OLHA ELE GIRANDO!";
      }
      else if (clickValue === 3 && kromer >= 500) {
          upgradeSound.play(); kromer -= 500; clickValue = 8;
          document.body.style.filter = "hue-rotate(150deg)";
          sub.innerText = "PODER NEO ATIVADO!";
      }
      else if (clickValue === 8 && kromer >= 1700 && kromer < 3000) {
          upgradeSound.play(); kromer -= 1700;
          document.body.style.filter = "hue-rotate(280deg) brightness(1.2)";
          sub.innerHTML = "[[OTIMIZADO]]";
      }
      else if (clickValue === 8 && kromer >= 3000) {
          upgradeSound.play(); kromer -= 3000; clickValue = 12;
          ralseiImg.src = "https://media.tenor.com/i80dpQLgQ00AAAAi/tenna-deltarune.gif";
          document.body.style.filter = "contrast(1.5) brightness(1.1) sepia(0.3)";
          sub.innerHTML = "[[PODER MÁXIMO CIBERNÉTICO]]";
      }
      else if (clickValue === 12 && kromer >= 3600) {
          upgradeSound.play(); kromer -= 3600; clickValue = 24;
          document.body.style.filter = "contrast(1.8) brightness(1.3) hue-rotate(320deg)";
          sub.innerHTML = "[[STATUS: DIVINDADE]]";
      }
      else if (autoValue === 0 && kromer >= 4500) {
          upgradeSound.play(); kromer -= 4500; autoValue = 10;
          document.body.style.filter = "hue-rotate(45deg) brightness(1.4) contrast(1.2)";
          sub.innerHTML = "[[GERAÇÃO AUTOMÁTICA ATIVA]]";
      }
      // COMPRA DO UPGRADE 10.000
      else if (kromer >= 5900 && !hasMiniSpamton) {
          upgradeSound.play();
          kromer -= 5900;
          clickValue = 39;
          hasMiniSpamton = true;
          document.getElementById('mini-spamton').style.display = 'block';
          document.body.style.filter = "contrast(1.5) hue-rotate(180deg) brightness(1.2)";
          sub.innerHTML = "[[BIG SHOT STATUS: ATIVADO]]";
          // Troca música para tema de boss
          if (player && player.loadVideoById) player.loadVideoById(bossMusicId);
      }
      updateDisplay();
    }

    function saveGame() {
        const gameState = {
            kromer: kromer, clickValue: clickValue, autoValue: autoValue, secondsPlayed: secondsPlayed,
            ralseiImg: document.getElementById('ralsei-img').src,
            filter: document.body.style.filter,
            hasMiniSpamton: hasMiniSpamton
        };
        localStorage.setItem('deltarune_save', JSON.stringify(gameState));
        updateRanking(kromer, secondsPlayed);
        alert("SAVE COMPLETO!");
    }

    function loadGame() {
        const saved = localStorage.getItem('deltarune_save');
        if (saved) {
            const data = JSON.parse(saved);
            kromer = data.kromer; clickValue = data.clickValue; 
            autoValue = data.autoValue || 0;
            secondsPlayed = data.secondsPlayed;
            document.getElementById('ralsei-img').src = data.ralseiImg;
            document.body.style.filter = data.filter;
            hasMiniSpamton = data.hasMiniSpamton || false;
            if(hasMiniSpamton) document.getElementById('mini-spamton').style.display = 'block';
            updateDisplay();
        }
    }

    function resetGame() {
        if(confirm("DELETAR TUDO?")) { localStorage.clear(); location.reload(); }
    }

    function updateRanking(score, time) {
        let ranking = JSON.parse(localStorage.getItem('deltarune_ranking') || "[]");
        ranking.push({ score, time, date: new Date().toLocaleDateString() });
        ranking.sort((a, b) => b.score - a.score);
        ranking = ranking.slice(0, 5);
        localStorage.setItem('deltarune_ranking', JSON.stringify(ranking));
    }

    function toggleRanking() {
        const modal = document.getElementById('ranking-modal');
        const list = document.getElementById('ranking-list');
        if (modal.style.display === 'flex') modal.style.display = 'none';
        else {
            let ranking = JSON.parse(localStorage.getItem('deltarune_ranking') || "[]");
            list.innerHTML = ranking.map((item, i) => `<p>${i+1}º - $${item.score} | ${formatTime(item.time)}</p>`).join('');
            modal.style.display = 'flex';
        }
    }

    document.addEventListener('keydown', (event) => {
        if (event.key === 'Enter' && !gameStarted) {
            startTheGame();
        }
    });

    function startTheGame() {
      gameStarted = true;
      const currentMusic = hasMiniSpamton ? bossMusicId : musicId;
      if (player && player.loadVideoById) player.loadVideoById(currentMusic);
      else if (player && player.playVideo) player.playVideo();

      document.getElementById('intro-screen').style.display = 'none';
      document.getElementById('game-screen').classList.add('active');
      
      // Timer principal
      timerInterval = setInterval(() => { 
        secondsPlayed++; 
        if(autoValue > 0) { kromer += autoValue; }
        updateDisplay(); 
      }, 1000);

      // NOVO INTERVALO: 2 clicks por segundo (0.5s) se tiver o upgrade de 10k
      setInterval(() => {
        if(hasMiniSpamton) {
            kromer += 2; // Simula 2 clicks automáticos extras
            updateDisplay();
        }
      }, 500);
    }

    let player;
    function onYouTubeIframeAPIReady() {
      player = new YT.Player('yt-player', {
        height: '0', width: '0', videoId: musicId,
        playerVars: { 'autoplay': 0, 'controls': 0, 'loop': 1, 'playlist': musicId }
      });
    }
  </script>
</body>
</html>
