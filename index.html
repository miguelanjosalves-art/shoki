<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OLÁ MUNDO...?</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
  
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: #0d0521;
      background: linear-gradient(to bottom, #0f0829 0%, #1a0e3d 40%, #2a1352 100%);
      color: #e0c8ff;
      font-family: 'VT323', monospace;
      font-size: 2.4rem;
      overflow: hidden;
      image-rendering: pixelated;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .scene {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      max-width: 1400px;
      gap: 60px;
    }

    .character {
      width: 160px;
      height: auto;
      filter: drop-shadow(0 0 15px rgba(255, 110, 240, 0.7));
      animation: floatChar 6s ease-in-out infinite;
    }

    .left-char { transform: scaleX(1); }
    .right-char { transform: scaleX(-1); }

    .center {
      text-align: center;
      position: relative;
      z-index: 5;
    }

    h1 {
      font-family: 'Press Start 2P', cursive;
      font-size: 4.2rem;
      color: #fff8e8;
      text-shadow: 
        0 0 12px #ff6ef0,
        0 0 24px #ff6ef0,
        8px 8px 0 #000,
        -8px -8px 0 #000,
        8px -8px 0 #000,
        -8px 8px 0 #000;
      margin: 0 0 20px 0;
      animation: glitch 5s infinite;
      letter-spacing: 6px;
    }

    .heart {
      font-size: 90px;
      margin: 10px auto;
      position: relative;
      width: 90px;
      height: 90px;
      animation: float 5s ease-in-out infinite;
    }

    .heart::before,
    .heart::after {
      content: "♥";
      position: absolute;
      left: 0;
      top: 0;
    }

    .heart::before { color: #ff2d55; text-shadow: 0 0 20px #ff477e; }
    .heart::after  { color: #ff6ef0; animation: colorShift 10s infinite; }

    .subtitle {
      font-size: 2rem;
      color: #b19cd9;
      text-shadow: 4px 4px 0 #000;
      letter-spacing: 3px;
      margin-bottom: 20px;
    }

    /* Estilo para a nova imagem clicável */
    .clickable-img {
      width: 80px; /* Ajuste o tamanho conforme necessário */
      cursor: pointer;
      transition: transform 0.2s, filter 0.2s;
      image-rendering: pixelated;
    }

    .clickable-img:hover {
      transform: scale(1.1);
      filter: brightness(1.2) drop-shadow(0 0 10px #ffeb3b);
    }

    @keyframes glitch {
      0%, 100% { transform: translate(0); }
      2%, 4%   { transform: translate(-3px, 3px); }
      6%       { transform: translate(3px, -3px); }
      20%, 80% { transform: translate(0); }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-20px); }
    }

    @keyframes colorShift {
      0%, 100% { filter: hue-rotate(0deg); }
      50%      { filter: hue-rotate(200deg); }
    }

    @keyframes floatChar {
      0%, 100% { transform: translateY(0) scale(1); }
      50%      { transform: translateY(-15px) scale(1.04); }
    }

    .soul {
      position: absolute;
      width: 28px;
      height: 28px;
      background: #ffeb3b;
      clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
      box-shadow: 0 0 18px #ffeb3b;
      animation: soulMove 15s infinite linear;
      pointer-events: none;
    }

    @keyframes soulMove {
      0%   { left: 5%; top: 85%; }
      25%  { left: 85%; top: 75%; }
      50%  { left: 65%; top: 15%; }
      75%  { left: 15%; top: 25%; }
      100% { left: 5%; top: 85%; }
    }
  </style>
</head>
<body>

  <div class="scene">
   
    <img src="https://media.tenor.com/osrwVQsq5NUAAAAi/kris-deltarune.gif" 
         alt="Kris" class="character left-char">

    
         <div class="center">
      <h1>OLÁ MUNDO...?</h1>
      <div class="heart">♥</div>
      <div class="subtitle">
        (aperte Z ou ENTER para continuar)
      </div>
      
      <a href="SUA_URL_AQUI">
        <img src="https://utdr.wiki/images/thumb/e/e0/Save_Point.gif/120px-Save_Point.gif" 
             alt="Ponto de Salvar" class="clickable-img">
      </a>
    </div>

   
    <img src="https://media.tenor.com/8qguU3aky9IAAAAj/susie-deltarune.gif" 
         alt="Susie" class="character right-char">
  </div>

  <div class="soul"></div>

</body>

</html>
