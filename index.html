<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DELTARUNE CLICKER - Z EDITION</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
  
  <style>
    body {
      margin: 0; height: 100vh;
      background: linear-gradient(to bottom, #0f0829 0%, #1a0e3d 40%, #2a1352 100%);
      color: #e0c8ff; font-family: 'VT323', monospace; font-size: 2.4rem;
      overflow: hidden; image-rendering: pixelated;
      display: flex; align-items: center; justify-content: center;
      user-select: none;
      touch-action: none;
    }

    .screen {
      display: none; width: 100%; height: 100%;
      align-items: center; justify-content: center;
      flex-direction: column; position: absolute;
    }
    .screen.active { display: flex; }

    .scene { display: flex; align-items: center; justify-content: center; width: 100%; max-width: 1400px; gap: 60px; }
    .character { width: 160px; height: auto; filter: drop-shadow(0 0 15px rgba(255, 110, 240, 0.7)); animation: floatChar 6s ease-in-out infinite; }
    .right-char { transform: scaleX(-1); }
    .center { text-align: center; }

    h1 {
      font-family: 'Press Start 2P', cursive; font-size: 4.2rem; color: #fff8e8;
      text-shadow: 0 0 12px #ff6ef0, 8px 8px 0 #000;
      margin: 0 0 20px 0; animation: glitch 5s infinite;
    }

    .heart { font-size: 90px; margin: 10px auto; animation: float 5s ease-in-out infinite; color: #ff2d55; }
    .subtitle { font-size: 2rem; color: #b19cd9; margin-bottom: 20px; text-align: center; }

    .ralsei-btn {
      width: 220px; transition: transform 0.1s;
      filter: drop-shadow(0 0 15px rgba(0, 255, 0, 0.4));
      pointer-events: none; /* CLIQUES DESATIVADOS */
    }
    
    #kromer-display {
      font-family: 'Press Start 2P', cursive; font-size: 3.5rem;
      color: #ffff00; text-shadow: 5px 5px 0 #000; margin-bottom: 20px;
    }

    #upgrade-container { margin-top: 20px; display: none; min-height: 80px; }
    .btn-upgrade {
      background: #000; color: #00ff00; border: 4px solid #fff;
      padding: 15px 30px; font-family: 'Press Start 2P', cursive;
      font-size: 1.2rem; cursor: pointer; box-shadow: 5px 5px 0 #00ff00;
    }
    .btn-upgrade:hover { background: #00ff00; color: #000; }

    #yt-player { position: absolute; top: -1000px; }

    @keyframes glitch { 0%, 100% { transform: translate(0); } 2%, 4% { transform: translate(-3px, 3px); } }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
    @keyframes floatChar { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
  </style>
</head>
<body oncontextmenu="return false;">

  <div id="yt-player"></div>

  <div id="intro-screen" class="screen active">
    <div class="scene">
      <img src="https://media.tenor.com/osrwVQsq5NUAAAAi/kris-deltarune.gif" alt="Kris" class="character">
      <div class="center">
        <h1>OLÁ MUNDO...?</h1>
        <div class="heart">♥</div>
        <div class="subtitle">(aperte Z para continuar)</div>
      </div>
      <img src="https://media.tenor.com/8qguU3aky9IAAAAj/susie-deltarune.gif" alt="Susie" class="character right-char">
    </div>
  </div>

  <div id="game-screen" class="screen">
    <div id="kromer-display">$ <span id="count">0</span></div>
    
    <img src="https://media.tenor.com/uQaQC--pzp8AAAAi/ralsei-spin.gif" 
         id="ralsei-img"
         class="ralsei-btn">
         
    <div id="upgrade-container">
        <button id="upgrade-btn" class="btn-upgrade" onclick="buyUpgrade()">
        </button>
    </div>

    <div class="subtitle" id="game-sub" style="margin-top: 20px;">USE A TECLA [Z]!</div>
  </div>

  <script src="https://www.youtube.com/iframe_api"></script>
  <script>
    let kromer = 0;
    let clickValue = 1;
    let gameStarted = false;
    let isKeyDown = false;

    const clickSound = new Audio('https://www.soundjay.com/buttons/sounds/button-37.mp3');
    const upgradeSound = new Audio('https://www.soundjay.com/buttons/sounds/button-09.mp3');

    function updateDisplay() {
      document.getElementById('count').innerText = Math.floor(kromer);
      checkUpgrades();
    }

    function addKromer() {
      if(!gameStarted) return;
      
      kromer += clickValue;
      updateDisplay();
      
      clickSound.currentTime = 0;
      clickSound.play();
      
      const ralsei = document.getElementById('ralsei-img');
      ralsei.style.transform = "scale(1.1)";
      setTimeout(() => { ralsei.style.transform = "scale(1)"; }, 50);
    }

    function checkUpgrades() {
      const container = document.getElementById('upgrade-container');
      const btn = document.getElementById('upgrade-btn');

      if (clickValue === 1 && kromer >= 50) {
          container.style.display = 'block';
          btn.innerHTML = "[[UPGRADE]] - 50 KROMER <br> (+2 POR CLIQUE)";
      } 
      else if (clickValue === 2 && kromer >= 200) {
          container.style.display = 'block';
          btn.innerHTML = "[[UPGRADE SUPREMO]] - 200 KROMER <br> (MUDAR APARÊNCIA)";
      }
      else if (clickValue === 3 && kromer >= 500) {
          container.style.display = 'block';
          btn.innerHTML = "[[HYPER-LINK]] - 500 KROMER <br> (+5 POR CLIQUE)";
      } else {
          container.style.display = 'none';
      }
    }

    function buyUpgrade() {
      const ralseiImg = document.getElementById('ralsei-img');
      const gameSub = document.getElementById('game-sub');

      if (clickValue === 1 && kromer >= 50) {
          upgradeSound.play();
          kromer -= 50;
          clickValue = 2;
          gameSub.innerText = "VOCÊ É UM [[BIG SHOT]] AGORA!";
      } 
      else if (clickValue === 2 && kromer >= 200) {
          upgradeSound.play();
          kromer -= 200;
          clickValue = 3;
          // NOVO LINK DO RALSEI AQUI:
          ralseiImg.src = "https://media.tenor.com/pBhLGoicbhsAAAAi/ralsei-ralsei-spin.gif";
          gameSub.innerText = "OLHA ELE GIRANDO!!";
      }
      else if (clickValue === 3 && kromer >= 500) {
          upgradeSound.play();
          kromer -= 500;
          clickValue += 5; 
          gameSub.innerHTML = "[[PODER NEO]] ATIVADO!";
          document.body.style.filter = "hue-rotate(150deg) brightness(1.2)";
      }

      updateDisplay();
    }

    function startTheGame() {
      if(gameStarted) return;
      gameStarted = true;
      if (player && player.playVideo) { player.playVideo(); }
      document.getElementById('intro-screen').style.display = 'none';
      document.getElementById('game-screen').classList.add('active');
    }

    document.addEventListener('keydown', (event) => {
      const key = event.key.toUpperCase();
      if (key === 'Z') {
        if (!gameStarted) {
          startTheGame();
        } else {
          if (!isKeyDown) {
            addKromer();
            isKeyDown = true;
          }
        }
      }
    });

    document.addEventListener('keyup', (event) => {
      const key = event.key.toUpperCase();
      if (key === 'Z') isKeyDown = false;
    });

    let player;
    function onYouTubeIframeAPIReady() {
      player = new YT.Player('yt-player', {
        height: '0', width: '0', videoId: 'VHo2mEg10zo',
        playerVars: { 'autoplay': 0, 'controls': 0 }
      });
    }
  </script>
</body>
</html>
