<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DELTARUNE - BOSS CHALLENGE</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
  
  <style>
    body {
      margin: 0; height: 100vh;
      background: linear-gradient(to bottom, #0f0829 0%, #1a0e3d 40%, #2a1352 100%);
      color: #e0c8ff; font-family: 'VT323', monospace; font-size: 2.4rem;
      overflow: hidden; image-rendering: pixelated;
      display: flex; align-items: center; justify-content: center;
      user-select: none;
    }

    .screen { display: none; width: 100%; height: 100%; align-items: center; justify-content: center; flex-direction: column; position: absolute; }
    .screen.active { display: flex; }

    #boss-trigger {
        position: absolute; top: 20px; right: 20px;
        background: #000; color: red; border: 4px solid red;
        font-family: 'Press Start 2P'; font-size: 1rem;
        padding: 15px; cursor: pointer; display: none; z-index: 200;
    }
    #boss-trigger:hover { background: red; color: white; }

    .scene { display: flex; align-items: center; justify-content: center; width: 100%; max-width: 1400px; gap: 60px; }
    .character { width: 160px; filter: drop-shadow(0 0 15px rgba(255, 110, 240, 0.7)); animation: floatChar 6s ease-in-out infinite; }
    .center { text-align: center; }
    h1 { font-family: 'Press Start 2P'; font-size: 4rem; color: #fff; text-shadow: 0 0 12px #ff6ef0, 8px 8px 0 #000; }
    .heart { font-size: 80px; color: #ff2d55; animation: float 5s infinite; }

    #kromer-display { font-family: 'Press Start 2P'; font-size: 3.5rem; color: #ffff00; text-shadow: 5px 5px 0 #000; margin-bottom: 20px; }
    .ralsei-btn { width: 220px; cursor: pointer; transition: transform 0.1s; filter: drop-shadow(0 0 10px green); }
    .radiant-glow { animation: rainbowGlow 1s linear infinite; }

    #boss-container { display: none; text-align: center; z-index: 100; }
    .enemy-boss { width: 300px; cursor: pointer; filter: drop-shadow(0 0 20px red); transition: transform 0.1s; }
    .enemy-boss:active { transform: scale(0.95); }
    
    #hp-bar-container { width: 450px; height: 35px; border: 4px solid white; background: #000; margin: 10px auto; position: relative; }
    #hp-fill { width: 100%; height: 100%; background: #00ff00; transition: width 0.3s; }

    .btn-action { background: #000; color: #fff; border: 4px solid #fff; padding: 10px 20px; font-family: 'Press Start 2P'; cursor: pointer; margin: 10px; }
    .btn-upgrade { color: #00ff00; border-color: #00ff00; display: none; margin-top: 20px; }

    #yt-player { position: absolute; top: -1000px; }
    @keyframes rainbowGlow { 0% { filter: hue-rotate(0deg) drop-shadow(0 0 20px white); } 100% { filter: hue-rotate(360deg) drop-shadow(0 0 20px white); } }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
    @keyframes floatChar { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
    .shake-screen { animation: shake 0.2s infinite; }
    @keyframes shake { 0% { transform: translate(2px, 2px); } 50% { transform: translate(-2px, -2px); } 100% { transform: translate(2px, -2px); } }
  </style>
</head>
<body id="main-body">

  <div id="yt-player"></div>
  <button id="boss-trigger" onclick="startBossFight()">[ BOSS ]</button>

  <div id="intro-screen" class="screen active">
    <div class="scene">
      <img src="https://media.tenor.com/osrwVQsq5NUAAAAi/kris-deltarune.gif" class="character">
      <div class="center">
        <h1>OLÁ MUNDO...?</h1>
        <div class="heart">♥</div>
        <div style="font-size: 1.5rem;">(Z OU ENTER PARA COMEÇAR)</div>
      </div>
      <img src="https://media.tenor.com/8qguU3aky9IAAAAj/susie-deltarune.gif" class="character" style="transform: scaleX(-1);">
    </div>
  </div>

  <div id="game-screen" class="screen">
    <div id="kromer-display">$ <span id="count">0</span></div>
    
    <div id="normal-game">
        <img src="https://media.tenor.com/uQaQC--pzp8AAAAi/ralsei-spin.gif" id="ralsei-img" class="ralsei-btn" onclick="addKromer()">
    </div>

    <div id="boss-container">
        <h2 style="color: red; font-family: 'Press Start 2P';">[[ BOSS: SPAMTON NEO ]]</h2>
        <div id="hp-bar-container">
            <div id="hp-fill"></div>
            <div style="position:absolute; width:100%; top:5px; font-family:'VT323'; font-size:1.8rem; color: white;">RALSEI HP</div>
        </div>
        <img src="https://media.tenor.com/970x1T6Nf60AAAAi/spamton-neo-spamton.gif" class="enemy-boss" onclick="hitEnemy()">
        <p id="boss-hp-text" style="font-family:'Press Start 2P'; font-size:1.2rem; color: #ff0000; margin: 10px;">SPAMTON HP: 350</p>
        <button class="btn-action" style="color: yellow; border-color: yellow;" onclick="spareBoss()">[ POUPAR ]</button>
    </div>

    <button id="upgrade-btn" class="btn-action btn-upgrade" onclick="buyUpgrade()"></button>
    <div id="game-sub" style="margin-top: 20px; font-size: 1.8rem;">PEGUE TODO O [[KROMER]]!</div>
  </div>

  <script src="https://www.youtube.com/iframe_api"></script>
  <script>
    let kromer = 0, clickValue = 1, gameStarted = false, isKeyDown = false;
    let isRadiant = false, bossActive = false, ralseiHP = 100;
    let bossHP = 350; 
    let bossTimer;

    const clickSound = new Audio('https://www.soundjay.com/buttons/sounds/button-37.mp3');
    const upgradeSound = new Audio('https://www.soundjay.com/buttons/sounds/button-09.mp3');

    function addKromer() {
      if(!gameStarted || bossActive) return;
      let val = isRadiant ? (clickValue * 2) : clickValue;
      kromer += val;
      updateDisplay();
      clickSound.currentTime = 0; clickSound.play();
      checkUpgrades();
    }

    function updateDisplay() { document.getElementById('count').innerText = kromer; }

    function checkUpgrades() {
      const btn = document.getElementById('upgrade-btn');
      if (clickValue === 1 && kromer >= 50) {
          btn.style.display = 'block'; btn.innerHTML = "[[UPGRADE]] - 50$ (+2 PER CLICK)";
      } else if (clickValue === 2 && kromer >= 200) {
          btn.style.display = 'block'; btn.innerHTML = "[[UPGRADE SUPREMO]] - 200$ (+3 PER CLICK)";
      }
    }

    function buyUpgrade() {
        if (clickValue === 1 && kromer >= 50) {
            kromer -= 50; clickValue = 2; upgradeSound.play();
        } else if (clickValue === 2 && kromer >= 200) {
            kromer -= 200; clickValue = 3; upgradeSound.play();
            document.getElementById('ralsei-img').src = "https://media.tenor.com/T_O8XF69L3AAAAAj/ralsei-deltarune.gif";
            document.getElementById('boss-trigger').style.display = 'block'; 
        }
        document.getElementById('upgrade-btn').style.display = 'none';
        updateDisplay();
    }

    function startBossFight() {
        if(bossActive) return;
        bossActive = true;
        ralseiHP = 100;
        bossHP = 350; 
        document.getElementById('normal-game').style.display = 'none';
        document.getElementById('boss-container').style.display = 'block';
        document.getElementById('boss-trigger').style.display = 'none';
        document.getElementById('main-body').classList.add('shake-screen');
        updateBossUI();
        bossTimer = setInterval(() => {
            ralseiHP -= 10;
            if(ralseiHP <= 0) { ralseiHP = 0; endBoss(false, "VOCÊ FOI DERROTADO..."); }
            updateBossUI();
        }, 1000);
    }

    function updateBossUI() {
        document.getElementById('hp-fill').style.width = ralseiHP + "%";
        document.getElementById('boss-hp-text').innerText = "SPAMTON HP: " + bossHP;
    }

    function hitEnemy() {
        if(!bossActive) return;
        bossHP -= 10; 
        clickSound.currentTime = 0; clickSound.play();
        if(bossHP <= 0) { bossHP = 0; endBoss(true, "VITÓRIA! RALSEI ESTÁ RADIANTE!", true); } // Alterado para dar o bônus
        updateBossUI();
    }

    function spareBoss() { endBoss(true, "POUPADO! RALSEI ESTÁ RADIANTE!", true); }

    function endBoss(win, msg, spared = false) {
        clearInterval(bossTimer);
        bossActive = false;
        document.getElementById('normal-game').style.display = 'block';
        document.getElementById('boss-container').style.display = 'none';
        document.getElementById('main-body').classList.remove('shake-screen');
        document.getElementById('game-sub').innerText = msg;
        document.getElementById('boss-trigger').style.display = 'block';
        
        // Removemos a linha que dava 2000$ e agora sempre ativa o bônus em caso de win
        if(win && spared) startRadiantBonus();
        updateDisplay();
    }

    function startRadiantBonus() {
        if(isRadiant) return;
        isRadiant = true;
        document.getElementById('ralsei-img').classList.add('radiant-glow');
        setTimeout(() => {
            isRadiant = false;
            document.getElementById('ralsei-img').classList.remove('radiant-glow');
        }, 15000);
    }

    function startTheGame() {
      if(gameStarted) return;
      gameStarted = true;
      if (player && player.playVideo) { player.playVideo(); }
      document.getElementById('intro-screen').style.display = 'none';
      document.getElementById('game-screen').classList.add('active');
    }

    document.addEventListener('keydown', (e) => {
      const key = e.key.toUpperCase();
      if (key === 'Z' || key === 'ENTER') {
        if (!gameStarted) startTheGame();
        else if (bossActive) hitEnemy();
        else if (!isKeyDown) { addKromer(); isKeyDown = true; }
      }
    });
    document.addEventListener('keyup', (e) => isKeyDown = false);

    let player;
    function onYouTubeIframeAPIReady() {
      player = new YT.Player('yt-player', { height: '0', width: '0', videoId: 'VHo2mEg10zo', playerVars: { 'autoplay': 0, 'controls': 0 } });
    }
  </script>
</body>
</html>
