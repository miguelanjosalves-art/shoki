<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OLÁ MUNDO...?</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
  
  <style>
    body {
      margin: 0; height: 100vh;
      background: linear-gradient(to bottom, #0f0829 0%, #1a0e3d 40%, #2a1352 100%);
      color: #e0c8ff; font-family: 'VT323', monospace; font-size: 2.4rem;
      overflow: hidden; image-rendering: pixelated;
      display: flex; align-items: center; justify-content: center;
    }

    .scene { display: flex; align-items: center; justify-content: center; width: 100%; max-width: 1400px; gap: 60px; }
    .character { width: 160px; height: auto; filter: drop-shadow(0 0 15px rgba(255, 110, 240, 0.7)); animation: floatChar 6s ease-in-out infinite; }
    .left-char { transform: scaleX(1); }
    .right-char { transform: scaleX(-1); }
    .center { text-align: center; z-index: 5; }

    h1 {
      font-family: 'Press Start 2P', cursive; font-size: 4.2rem; color: #fff8e8;
      text-shadow: 0 0 12px #ff6ef0, 8px 8px 0 #000;
      margin: 0 0 20px 0; animation: glitch 5s infinite;
    }

    .heart { font-size: 90px; margin: 10px auto; animation: float 5s ease-in-out infinite; color: #ff2d55; }
    .subtitle { font-size: 2rem; color: #b19cd9; margin-bottom: 20px; }

    .ralsei-btn {
      width: 100px; cursor: pointer; transition: transform 0.2s;
      filter: drop-shadow(0 0 10px rgba(0, 255, 0, 0.3));
      display: block; margin: 0 auto;
    }
    .ralsei-btn:hover { transform: scale(1.2); filter: drop-shadow(0 0 20px rgba(100, 255, 100, 0.8)); }

    /* Escondendo os dois players lá longe */
    .hidden-player { position: absolute; top: -5000px; left: -5000px; width: 1px; height: 1px; }

    @keyframes glitch { 0%, 100% { transform: translate(0); } 2%, 4% { transform: translate(-3px, 3px); } }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
    @keyframes floatChar { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
  </style>
</head>
<body>

  <div id="yt-ralsei" class="hidden-player"></div>
  <div id="yt-z" class="hidden-player"></div>

  <div class="scene">
    <img src="https://media.tenor.com/osrwVQsq5NUAAAAi/kris-deltarune.gif" alt="Kris" class="character left-char">

    <div class="center">
      <h1>OLÁ MUNDO...?</h1>
      <div class="heart">♥</div>
      <div class="subtitle">(aperte Z para Empty Town ou clique no Ralsei)</div>
      
      <img src="https://media.tenor.com/uQaQC--pzp8AAAAi/ralsei-spin.gif" 
           class="ralsei-btn" 
           onclick="playRalsei()">
    </div>

    <img src="https://media.tenor.com/8qguU3aky9IAAAAj/susie-deltarune.gif" alt="Susie" class="character right-char">
  </div>

  <script src="https://www.youtube.com/iframe_api"></script>
  <script>
    let playerRalsei;
    let playerZ;

    const ID_RALSEI = 'VHo2mEg10zo'; // Once Upon a Time
    const ID_Z = 'In3y0C7mQvA';      // Empty Town

    function onYouTubeIframeAPIReady() {
      // Criando o player do Ralsei
      playerRalsei = new YT.Player('yt-ralsei', {
        height: '0', width: '0', videoId: ID_RALSEI,
        playerVars: { 'autoplay': 0, 'controls': 0 }
      });

      // Criando o player da tecla Z (com Loop)
      playerZ = new YT.Player('yt-z', {
        height: '0', width: '0', videoId: ID_Z,
        playerVars: { 'autoplay': 0, 'controls': 0, 'loop': 1, 'playlist': ID_Z },
        events: {
          'onStateChange': (e) => { if(e.data === YT.PlayerState.ENDED) playerZ.playVideo(); }
        }
      });
    }

    // Função disparada pelo clique no Ralsei
    function playRalsei() {
      if (playerRalsei && playerRalsei.playVideo) {
        playerRalsei.seekTo(0); // Sempre começa do início ao clicar
        playerRalsei.playVideo();
      }
    }

    // Função disparada pela tecla Z
    function playEmptyTown() {
      if (playerZ && playerZ.playVideo) {
        playerZ.playVideo();
      }
    }

    // Ouvinte do Teclado
    document.addEventListener('keydown', function(event) {
      if (event.key.toLowerCase() === 'z') {
        playEmptyTown();
      }
    });
  </script>

</body>
</html>
