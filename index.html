<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DELTARUNE CLICKER - Z EDITION</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
  
  <style>
    body {
      margin: 0; height: 100vh;
      background: linear-gradient(to bottom, #0f0829 0%, #1a0e3d 40%, #2a1352 100%);
      color: #e0c8ff; font-family: 'VT323', monospace; font-size: 2.4rem;
      overflow: hidden; image-rendering: pixelated;
      display: flex; align-items: center; justify-content: center;
      user-select: none; touch-action: none;
    }

    .screen {
      display: none; width: 100%; height: 100%;
      align-items: center; justify-content: center;
      flex-direction: column; position: absolute;
    }
    .screen.active { display: flex; }

    h1 {
      font-family: 'Press Start 2P', cursive; font-size: 3.5rem; color: #fff8e8;
      text-shadow: 0 0 12px #ff6ef0, 8px 8px 0 #000;
      margin-bottom: 20px; animation: glitch 5s infinite;
    }

    .ralsei-btn {
      width: 220px; transition: transform 0.1s;
      filter: drop-shadow(0 0 15px rgba(0, 255, 0, 0.4));
      pointer-events: none;
    }
    
    #kromer-display {
      font-family: 'Press Start 2P', cursive; font-size: 3.5rem;
      color: #ffff00; text-shadow: 5px 5px 0 #000; margin-bottom: 20px;
    }

    #upgrade-container { margin-top: 20px; display: none; min-height: 100px; }
    .btn-upgrade {
      background: #000; color: #00ff00; border: 4px solid #fff;
      padding: 15px 30px; font-family: 'Press Start 2P', cursive;
      font-size: 1rem; cursor: pointer; box-shadow: 5px 5px 0 #00ff00;
      text-align: center;
    }
    .btn-upgrade:hover { background: #00ff00; color: #000; }

    .subtitle { font-size: 2rem; color: #b19cd9; margin-top: 20px; text-align: center; }

    @keyframes glitch { 0%, 100% { transform: translate(0); } 2%, 4% { transform: translate(-3px, 3px); } }
  </style>
</head>
<body>

  <div id="intro-screen" class="screen active">
    <h1>DELTARUNE CLICKER</h1>
    <div class="subtitle">(aperte Z para continuar)</div>
  </div>

  <div id="game-screen" class="screen">
    <div id="kromer-display">$ <span id="count">0</span></div>
    
    <img src="https://media.tenor.com/uQaQC--pzp8AAAAi/ralsei-spin.gif" 
         id="ralsei-img"
         class="ralsei-btn">
         
    <div id="upgrade-container">
        <button id="upgrade-btn" class="btn-upgrade" onclick="buyUpgrade()"></button>
    </div>

    <div class="subtitle" id="game-sub">USE A TECLA [Z]!</div>
  </div>

  <script>
    let kromer = 0;
    let clickValue = 1;
    let gameStarted = false;
    let isKeyDown = false;

    const clickSound = new Audio('https://www.soundjay.com/buttons/sounds/button-37.mp3');
    const upgradeSound = new Audio('https://www.soundjay.com/buttons/sounds/button-09.mp3');

    function updateDisplay() {
      document.getElementById('count').innerText = Math.floor(kromer);
      checkUpgrades();
    }

    function addKromer() {
      if(!gameStarted) return;
      
      kromer += clickValue;
      updateDisplay();
      
      clickSound.currentTime = 0;
      clickSound.play();
      
      const ralsei = document.getElementById('ralsei-img');
      ralsei.style.transform = "scale(1.1)";
      setTimeout(() => { ralsei.style.transform = "scale(1)"; }, 50);
    }

    function checkUpgrades() {
      const container = document.getElementById('upgrade-container');
      const btn = document.getElementById('upgrade-btn');

      // Mostrar upgrade de 50
      if (clickValue === 1 && kromer >= 50) {
          container.style.display = 'block';
          btn.innerHTML = "[[UPGRADE]] - 50 KROMER <br> (+2 POR Z)";
      } 
      // Mostrar upgrade de 200 (Troca de GIF)
      else if (clickValue === 3 && kromer >= 200 && !document.getElementById('ralsei-img').src.includes("pBhLGoicbhs")) {
          container.style.display = 'block';
          btn.innerHTML = "[[SUPREMO]] - 200 KROMER <br> (GIRAR!)";
      }
      // Mostrar upgrade de 1700 (8 pontos por clique)
      else if (clickValue === 3 && kromer >= 1700) {
          container.style.display = 'block';
          btn.innerHTML = "[[ULTRA UPGRADE]] - 1700 KROMER <br> (8 PONTOS POR Z)";
      }
      else {
          container.style.display = 'none';
      }
    }

    function buyUpgrade() {
      const ralseiImg = document.getElementById('ralsei-img');
      const gameSub = document.getElementById('game-sub');

      // Upgrade de 50: vai para 3 pontos (1+2)
      if (clickValue === 1 && kromer >= 50) {
          upgradeSound.play();
          kromer -= 50;
          clickValue = 3;
          gameSub.innerText = "VOCÊ É UM [[BIG SHOT]]!";
      } 
      // Upgrade de 200: Troca o GIF
      else if (clickValue === 3 && kromer >= 200 && !ralseiImg.src.includes("pBhLGoicbhs")) {
          upgradeSound.play();
          kromer -= 200;
          ralseiImg.src = "https://media.tenor.com/pBhLGoicbhsAAAAi/ralsei-ralsei-spin.gif";
          gameSub.innerText = "OLHA O GIRO!";
      }
      // Upgrade de 1700: Valor fixo de 8 pontos por clique
      else if (clickValue === 3 && kromer >= 1700) {
          upgradeSound.play();
          kromer -= 1700;
          clickValue = 8; // Agora cada clique dá exatamente 8
          gameSub.innerHTML = "[[PONTUAÇÃO OTIMIZADA]]!!!";
          document.body.style.filter = "hue-rotate(280deg) brightness(1.3)";
      }

      updateDisplay();
    }

    function startTheGame() {
      if(gameStarted) return;
      gameStarted = true;
      document.getElementById('intro-screen').style.display = 'none';
      document.getElementById('game-screen').classList.add('active');
    }

    document.addEventListener('keydown', (event) => {
      if (event.key.toUpperCase() === 'Z') {
        if (!gameStarted) startTheGame();
        else if (!isKeyDown) { addKromer(); isKeyDown = true; }
      }
    });

    document.addEventListener('keyup', (event) => {
      if (event.key.toUpperCase() === 'Z') isKeyDown = false;
    });
  </script>
</body>
</html>
