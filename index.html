<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>DELTARUNE CLICKER - BOSS MUSIC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
  
  <style>
    body {
      margin: 0; height: 100vh;
      background: linear-gradient(to bottom, #0f0829 0%, #1a0e3d 40%, #2a1352 100%);
      color: #e0c8ff; font-family: 'VT323', monospace; font-size: 2.4rem;
      overflow: hidden; image-rendering: pixelated;
      display: flex; align-items: center; justify-content: center;
      user-select: none; touch-action: manipulation;
    }

    .screen {
      display: none; width: 100%; height: 100%;
      align-items: center; justify-content: center;
      flex-direction: column; position: absolute;
    }
    .screen.active { display: flex; }

    .game-area { position: relative; display: flex; align-items: center; justify-content: center; }

    .ralsei-btn {
      width: 220px; height: auto; display: block;
      transition: transform 0.05s;
      filter: drop-shadow(0 0 15px rgba(0, 255, 0, 0.4));
      cursor: pointer; z-index: 2;
    }
    .ralsei-btn:active { transform: scale(0.9) !important; }

    #mini-spamton {
      position: absolute; width: 60px; height: auto;
      right: -70px; top: 50%; transform: translateY(-50%);
      display: none; animation: float 1.5s ease-in-out infinite;
      filter: drop-shadow(0 0 8px yellow);
    }
    
    #kromer-display {
      font-family: 'Press Start 2P', cursive; font-size: 3rem;
      color: #ffff00; text-shadow: 4px 4px 0 #000; margin-bottom: 10px;
    }

    .timer-display { font-size: 1.5rem; color: #fff; margin-bottom: 20px; }
    #upgrade-container { margin-top: 10px; display: none; min-height: 80px; }
    
    .btn-upgrade {
      background: #000; color: #00ff00; border: 4px solid #fff;
      padding: 15px 30px; font-family: 'Press Start 2P', cursive;
      font-size: 1rem; cursor: pointer; box-shadow: 5px 5px 0 #00ff00;
    }

    .menu-buttons { position: absolute; bottom: 20px; display: flex; gap: 20px; }
    .btn-ui {
      background: #000; color: #fff; border: 3px solid #fff;
      padding: 10px 20px; font-family: 'Press Start 2P', cursive; font-size: 0.8rem; cursor: pointer;
    }

    @keyframes float { 0%, 100% { transform: translateY(-50%) scale(1); } 50% { transform: translateY(-75%) scale(1.1); } }
  </style>
</head>
<body>

  <div id="yt-player" style="position: absolute; top: -1000px;"></div>

  <div id="intro-screen" class="screen active">
    <div style="text-align:center">
      <h1 style="font-family:'Press Start 2P'">DELTARUNE CLICKER</h1>
      <div style="font-size: 1.5rem; color: #b19cd9;">Pressione [ENTER] para Iniciar</div>
      <p style="font-size: 1rem;">(Clique na tela antes para ativar o áudio)</p>
    </div>
  </div>

  <div id="game-screen" class="screen">
    <div id="kromer-display">$ <span id="count">0</span></div>
    <div class="timer-display">TEMPO: <span id="timer">00:00</span></div>
    
    <div class="game-area">
        <img src="https://media.tenor.com/uQaQC--pzp8AAAAi/ralsei-spin.gif" id="ralsei-img" class="ralsei-btn" onclick="addKromer()">
        <img src="https://media.tenor.com/69pA_Y6S69UAAAAi/spamton-g-spamton-spamton.gif" id="mini-spamton">
    </div>
         
    <div id="upgrade-container">
        <button id="upgrade-btn" class="btn-upgrade" onclick="buyUpgrade()"></button>
    </div>

    <div class="subtitle" id="game-sub" style="margin-top: 20px; font-size: 1.5rem;">CLIQUE NO RALSEI!</div>

    <div class="menu-buttons">
      <button class="btn-ui" onclick="saveGame()">SALVAR</button>
      <button class="btn-ui" onclick="resetGame()" style="color: red; border-color: red;">RESET</button>
    </div>
  </div>

  <script src="https://www.youtube.com/iframe_api"></script>
  <script>
    let kromer = 0;
    let clickValue = 1;
    let autoValue = 0;
    let gameStarted = false;
    let secondsPlayed = 0;
    let timerInterval;
    let bossPhase = false;

    const musicIntro = "In3y0C7mQvA"; // Tema calmo
    const musicBoss = "v_Uv6G-mC4I";   // BIG SHOT (Tema do Boss)

    const clickSound = new Audio('https://www.soundjay.com/buttons/sounds/button-37.mp3');
    const upgradeSound = new Audio('https://www.soundjay.com/buttons/sounds/button-09.mp3');

    window.onload = () => { loadGame(); };

    function updateDisplay() {
      document.getElementById('count').innerText = Math.floor(kromer);
      const mins = Math.floor(secondsPlayed / 60);
      const secs = secondsPlayed % 60;
      document.getElementById('timer').innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
      checkUpgrades();
    }

    function addKromer() {
      if(!gameStarted) return;
      kromer += clickValue;
      updateDisplay();
      clickSound.currentTime = 0;
      clickSound.play();
    }

    function checkUpgrades() {
      const container = document.getElementById('upgrade-container');
      const btn = document.getElementById('upgrade-btn');
      
      if (clickValue < 24 && kromer >= 50) {
          container.style.display = 'block';
          btn.innerHTML = "[[UPGRADE]] - 50";
      } 
      else if (clickValue === 24 && autoValue === 0 && kromer >= 6700) {
          container.style.display = 'block';
          btn.innerHTML = "[[GERADOR]] - 6700";
      }
      else if (!bossPhase && kromer >= 10000) {
          container.style.display = 'block';
          btn.innerHTML = "[[BIG SHOT]] - 10000 <br> NOVA MÚSICA + PODER";
      }
      else { container.style.display = 'none'; }
    }

    function buyUpgrade() {
      if (clickValue < 24 && kromer >= 50) {
          kromer -= 50; clickValue = 24; upgradeSound.play();
      }
      else if (clickValue === 24 && autoValue === 0 && kromer >= 6700) {
          kromer -= 6700; autoValue = 10; upgradeSound.play();
      }
      else if (kromer >= 10000 && !bossPhase) {
          upgradeSound.play();
          kromer -= 10000;
          clickValue = 39;
          bossPhase = true;
          
          // Troca de música
          if (player && player.loadVideoById) {
              player.loadVideoById(musicBoss);
          }

          document.getElementById('mini-spamton').style.display = 'block';
          document.body.style.filter = "contrast(1.4) hue-rotate(180deg)";
          document.getElementById('game-sub').innerHTML = "[[BIG SHOT]] ATIVADO!";
      }
      updateDisplay();
    }

    function saveGame() {
        localStorage.setItem('deltarune_save', JSON.stringify({ kromer, clickValue, autoValue, secondsPlayed, bossPhase }));
        alert("GAME SALVO!");
    }

    function loadGame() {
        const saved = localStorage.getItem('deltarune_save');
        if (saved) {
            const data = JSON.parse(saved);
            kromer = data.kromer; clickValue = data.clickValue; 
            autoValue = data.autoValue || 0;
            secondsPlayed = data.secondsPlayed;
            bossPhase = data.bossPhase || false;
            if(bossPhase) {
                document.getElementById('mini-spamton').style.display = 'block';
                document.body.style.filter = "contrast(1.4) hue-rotate(180deg)";
            }
            updateDisplay();
        }
    }

    function resetGame() { if(confirm("RESETAR TUDO?")) { localStorage.clear(); location.reload(); } }

    document.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !gameStarted) startTheGame(); });

    function startTheGame() {
      gameStarted = true;
      const targetId = bossPhase ? musicBoss : musicIntro;
      if (player && player.loadVideoById) player.loadVideoById(targetId);
      
      document.getElementById('intro-screen').style.display = 'none';
      document.getElementById('game-screen').classList.add('active');
      
      timerInterval = setInterval(() => { 
        secondsPlayed++; 
        if(autoValue > 0) { kromer += autoValue; }
        updateDisplay(); 
      }, 1000);

      // Mecânica de cliques automáticos 2x por segundo
      setInterval(() => {
        if(bossPhase) {
            kromer += 2; // Simula 2 "clicks" extras
            updateDisplay();
        }
      }, 500); 
    }

    let player;
    function onYouTubeIframeAPIReady() {
      player = new YT.Player('yt-player', {
        height: '0', width: '0',
        videoId: musicIntro,
        playerVars: { 'autoplay': 0, 'controls': 0, 'loop': 1 }
      });
    }
  </script>
</body>
</html>
